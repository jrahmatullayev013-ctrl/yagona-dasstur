<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Yagona Dastur — Bosh menyu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #d9a7c7 0%, #fffcdc 100%);
      min-height: 100vh;
    }
    /* Tepadagi navigatsiya paneli */
    .navbar {
      background: #2c3e50;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }
    .navbar h1 {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 18px;
      transition: 0.3s;
    }
    .nav-links a:hover {
      color: #f1c40f;
    }
    /* Asosiy blok */
    .container {
      max-width: 700px;
      margin: 60px auto;
      text-align: center;
    }
    .menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 20px;
      padding: 20px;
      background: #34495e;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 22px;
      font-weight: bold;
      width: 250px;
      transition: 0.3s;
    }
    .menu-btn:hover {
      background: #2c3e50;
    }
    .menu-btn span {
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <!-- Tepada logotip va menyu -->
  <div class="navbar">
    <h1>📘 Yagona Dastur</h1>
    <div class="nav-links">
      <a href="mocktest.html">Mock Test</a>
      <a href="haqida.html">Dastur haqida</a>
    </div>
  </div>

  <!-- Pastda Registratsiya tugmasi -->
  <div class="container">
    <a href="registratsiya.html" class="menu-btn">
      📝 <span>Registratsiya</span>
    </a>
  </div>
</body>
</html>
