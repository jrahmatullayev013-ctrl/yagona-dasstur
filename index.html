<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Yagona Dastur — Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      /* Gradient fon */
      background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    select, button {
      margin-top: 10px;
      padding: 10px 14px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #45a049;
    }
    .question {
      margin: 15px 0;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
    }
    #result {
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sinf tanlash -->
    <label for="classSelect">Sinfni tanlang:</label>
    <select id="classSelect">
      <option value="5">5-sinf</option>
      <option value="6">6-sinf</option>
      <option value="7">7-sinf</option>
      <option value="8">8-sinf</option>
      <option value="9">9-sinf</option>
      <option value="10">10-sinf</option>
      <option value="11">11-sinf</option>
    </select>

    <!-- Fan tanlash -->
    <label for="subjectSelect">Fan tanlang:</label>
    <select id="subjectSelect">
      <option value="matematika">Matematika</option>
      <option value="fizika">Fizika</option>
      <option value="informatika">Informatika</option>
    </select>

    <button onclick="startTest()">Boshlash</button>

    <!-- Savollar bloki -->
    <div id="questions"></div>
    <div id="result"></div>
  </div>

  <script>
    // Savollarni sinf va fan bo‘yicha saqlaymiz
    const testQuestions = {
      "5": {
        "matematika": [
          {q:"25 × 4 = ?", opts:["50","75","100"], ans:2},
          {q:"81 ning kvadrat ildizi?", opts:["9","8","7"], ans:0}
        ],
        "fizika": [
          {q:"Tezlik formulasi qaysi?", opts:["v=s/t","F=m·a","E=m·c²"], ans:0}
        ],
        "informatika": [
          {q:"HTMLda sarlavha uchun teg?", opts:["<p>","<h1>","<div>"], ans:1}
        ]
      },
      "6": {
        "matematika": [
          {q:"2x + 3 = 15 bo‘lsa, x = ?", opts:["5","6","7"], ans:1}
        ],
        "fizika": [
          {q:"Nyutonning 2-qonuni?", opts:["F=m·a","E=m·c²","p=m·v"], ans:0}
        ],
        "informatika": [
          {q:"CSSda rang berish uchun?", opts:["color","font-size","margin"], ans:0}
        ]
      }
      // boshqa sinflar uchun ham shu tarzda qo‘shiladi
    };

    function startTest() {
      const selectedClass = document.getElementById("classSelect").value;
      const selectedSubject = document.getElementById("subjectSelect").value;
      const questionsDiv = document.getElementById("questions");
      const resultDiv = document.getElementById("result");
      questionsDiv.innerHTML = ""; 
      resultDiv.innerHTML = "";

      const questions = testQuestions[selectedClass][selectedSubject];
      if (!questions) {
        questionsDiv.innerHTML = "<p>Bu sinf va fan uchun savollar hali qo‘shilmagan.</p>";
        return;
      }

      questions.forEach((item, index) => {
        const qDiv = document.createElement("div");
        qDiv.className = "question";
        qDiv.innerHTML = `<p>${index+1}-savol: ${item.q}</p>` +
          item.opts.map((opt,i)=>`<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`).join("");
        questionsDiv.appendChild(qDiv);
      });

      // Tugatish tugmasi
      const finishBtn = document.createElement("button");
      finishBtn.textContent = "Tugatish";
      finishBtn.onclick = () => calculateScore(questions);
      questionsDiv.appendChild(finishBtn);
    }

    function calculateScore(questions) {
      let score = 0;
      questions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && parseInt(selected.value) === item.ans) {
          score++;
        }
      });
      document.getElementById("result").innerHTML = 
        `Sizning balingiz: ${score} / ${questions.length}`;
    }
  </script>
</body>
</html>
