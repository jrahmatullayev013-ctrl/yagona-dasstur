<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Test + O‘yin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #0066cc, #3399ff);
      color: #fff;
    }
    .track {
      width: 90%;
      height: 50px;
      background: #eee;
      margin: 20px auto;
      border-radius: 10px;
      position: relative;
    }
    .car {
      width: 40px;
      height: 40px;
      border-radius: 5px;
      position: absolute;
      top: 5px;
    }
    #car1 {
      background: red;
      left: 0;
    }
    #car2 {
      background: green;
      left: 0;
      top: 55px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🏁 Test + O‘yin</h1>
  <p>To‘g‘ri javob mashinani oldinga, xato javob orqaga harakatlantiradi!</p>

  <!-- Yo‘llar -->
  <div class="track">
    <div id="car1" class="car"></div>
  </div>
  <div class="track">
    <div id="car2" class="car"></div>
  </div>

  <!-- Savollar -->
  <h2>5 + 7 = ? (1-o‘yinchi)</h2>
  <button onclick="checkAnswer(12,'car1',12)">12</button>
  <button onclick="checkAnswer(13,'car1',12)">13</button>
  <button onclick="checkAnswer(14,'car1',12)">14</button>

  <h2>9 × 3 = ? (2-o‘yinchi)</h2>
  <button onclick="checkAnswer(27,'car2',27)">27</button>
  <button onclick="checkAnswer(21,'car2',27)">21</button>
  <button onclick="checkAnswer(18,'car2',27)">18</button>

  <h2 id="winner"></h2>

  <script>
    function checkAnswer(answer, carId, correctAnswer) {
      const car = document.getElementById(carId);
      let currentLeft = parseInt(car.style.left || 0);

      if (answer === correctAnswer) {
        currentLeft += 100; // to‘g‘ri javobda oldinga
      } else {
        currentLeft -= 50;  // xato javobda orqaga
        if (currentLeft < 0) currentLeft = 0; // orqaga cheksiz ketmasin
      }

      car.style.left = currentLeft + "px";

      if (currentLeft >= 800) {
        document.getElementById("winner").innerText = 
          (carId === "car1" ? "🔴 1-o‘yinchi yutdi!" : "🟢 2-o‘yinchi yutdi!");
      }
    }
  </script>
</body>
</html>
