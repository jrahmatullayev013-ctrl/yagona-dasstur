<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Test + O‘yin (50 savol)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #0066cc, #3399ff);
      color: #fff;
    }
    .track {
      width: 90%;
      height: 50px;
      background: #eee;
      margin: 20px auto;
      border-radius: 10px;
      position: relative;
    }
    .car {
      width: 40px;
      height: 40px;
      border-radius: 5px;
      position: absolute;
      top: 5px;
    }
    #car1 {
      background: red;
      left: 0;
    }
    #car2 {
      background: green;
      left: 0;
      top: 55px;
    }
    .answers button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🏁 Test + O‘yin</h1>
  <p>To‘g‘ri javob mashinani oldinga, xato javob orqaga harakatlantiradi!</p>

  <!-- Yo‘llar -->
  <div class="track">
    <div id="car1" class="car"></div>
  </div>
  <div class="track">
    <div id="car2" class="car"></div>
  </div>

  <!-- Savol joyi -->
  <h2 id="question"></h2>
  <div class="answers" id="answers"></div>

  <h2 id="winner"></h2>

  <script>
    // 50 ta savol massiv
    const questions = [
      {q: "5 + 7 = ?", options:[12,13,14], correct:12},
      {q: "9 × 3 = ?", options:[27,21,18], correct:27},
      {q: "15 - 6 = ?", options:[9,10,8], correct:9},
      // ... shu tarzda 50 ta savol qo‘shasiz
    ];

    let currentIndex = 0;

    function loadQuestion() {
      if (currentIndex >= questions.length) {
        document.getElementById("question").innerText = "Savollar tugadi!";
        document.getElementById("answers").innerHTML = "";
        return;
      }
      const q = questions[currentIndex];
      document.getElementById("question").innerText = q.q;
      document.getElementById("answers").innerHTML = "";
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, q.correct);
        document.getElementById("answers").appendChild(btn);
      });
    }

    function checkAnswer(answer, correctAnswer) {
      const car = currentIndex % 2 === 0 ? document.getElementById("car1") : document.getElementById("car2");
      let currentLeft = parseInt(car.style.left || 0);

      if (answer === correctAnswer) {
        currentLeft += 100; // to‘g‘ri javob
      } else {
        currentLeft -= 50;  // xato javob
        if (currentLeft < 0) currentLeft = 0;
      }

      car.style.left = currentLeft + "px";

      if (currentLeft >= 800) {
        document.getElementById("winner").innerText = 
          (car.id === "car1" ? "🔴 1-o‘yinchi yutdi!" : "🟢 2-o‘yinchi yutdi!");
        return;
      }

      currentIndex++;
      loadQuestion();
    }

    // Boshlash
    loadQuestion();
  </script>
</body>
</html>
