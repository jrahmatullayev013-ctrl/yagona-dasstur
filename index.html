<!DOCTYPE html>
<html lang="uz">
<head>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;

      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 60px auto;
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    .menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 15px;
      padding: 20px;
      background: #555;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 22px;
      font-weight: bold;
      width: 250px;
      transition: 0.3s;
    }
    .menu-btn:hover {
      background: #333;
    }
    .menu-btn span {
      margin-left: 10px;
    }
    .top-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .bottom-buttons {
      margin-top: 20px;
    }

</head>

  <div class="container">

    <!-- Tepada Mock Test va Dastur haqida -->
    <div class="top-buttons">
      <a href="mocktest.html" class="menu-btn">

      </a>
      <a href="haqida.html" class="menu-btn">
        ℹ️ <span>Dastur haqida</span>
      </a>

    <div class="bottom-buttons">
      <a href="registratsiya.html" class="menu-btn">
