<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>5-sinf Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .question {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .question h3 {
      margin-bottom: 10px;
    }
    .question label {
      display: block;
      margin: 5px 0;
    }
    #submitBtn {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 18px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #result {
      text-align: center;
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>5-sinf Matematika Testi</h1>

  <form id="quizForm">
    <div class="question">
      <h3>1-savol: 25 ÷ 5 = ?</h3>
      <label><input type="radio" name="q1" value="a"> 5</label>
      <label><input type="radio" name="q1" value="b"> 10</label>
      <label><input type="radio" name="q1" value="c"> 15</label>
    </div>

    <div class="question">
      <h3>2-savol: 7 × 6 = ?</h3>
      <label><input type="radio" name="q2" value="a"> 42</label>
      <label><input type="radio" name="q2" value="b"> 36</label>
      <label><input type="radio" name="q2" value="c"> 48</label>
    </div>

    <div class="question">
      <h3>3-savol: 100 – 45 = ?</h3>
      <label><input type="radio" name="q3" value="a"> 55</label>
      <label><input type="radio" name="q3" value="b"> 65</label>
      <label><input type="radio" name="q3" value="c"> 75</label>
    </div>

    <div class="question">
      <h3>4-savol: 12 + 18 = ?</h3>
      <label><input type="radio" name="q4" value="a"> 28</label>
      <label><input type="radio" name="q4" value="b"> 30</label>
      <label><input type="radio" name="q4" value="c"> 32</label>
    </div>

    <div class="question">
      <h3>5-savol: 9 × 9 = ?</h3>
      <label><input type="radio" name="q5" value="a"> 81</label>
      <label><input type="radio" name="q5" value="b"> 72</label>
      <label><input type="radio" name="q5" value="c"> 99</label>
    </div>

    <div class="question">
      <h3>6-savol: 50 ÷ 2 = ?</h3>
      <label><input type="radio" name="q6" value="a"> 20</label>
      <label><input type="radio" name="q6" value="b"> 25</label>
      <label><input type="radio" name="q6" value="c"> 30</label>
    </div>

    <div class="question">
      <h3>7-savol: 15 + 27 = ?</h3>
      <label><input type="radio" name="q7" value="a"> 42</label>
      <label><input type="radio" name="q7" value="b"> 40</label>
      <label><input type="radio" name="q7" value="c"> 45</label>
    </div>

    <div class="question">
      <h3>8-savol: 8 × 4 = ?</h3>
      <label><input type="radio" name="q8" value="a"> 32</label>
      <label><input type="radio" name="q8" value="b"> 36</label>
      <label><input type="radio" name="q8" value="c"> 28</label>
    </div>

    <div class="question">
      <h3>9-savol: 60 – 19 = ?</h3>
      <label><input type="radio" name="q9" value="a"> 41</label>
      <label><input type="radio" name="q9" value="b"> 39</label>
      <label><input type="radio" name="q9" value="c"> 42</label>
    </div>

    <div class="question">
      <h3>10-savol: 11 × 5 = ?</h3>
      <label><input type="radio" name="q10" value="a"> 55</label>
      <label><input type="radio" name="q10" value="b"> 50</label>
      <label><input type="radio" name="q10" value="c"> 60</label>
    </div>

    <button type="button" id="submitBtn">Natijani ko‘rish</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById("submitBtn").onclick = function() {
      let score = 0;

      if(document.querySelector('input[name="q1"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q2"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q3"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q4"]:checked')?.value === "b") score++;
      if(document.querySelector('input[name="q5"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q6"]:checked')?.value === "b") score++;
      if(document.querySelector('input[name="q7"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q8"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q9"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q10"]:checked')?.value === "a") score++;

      document.getElementById("result").innerText = 
        "Sizning natijangiz: " + score + " / 10";
    }
  </script>
</body>
</html>
