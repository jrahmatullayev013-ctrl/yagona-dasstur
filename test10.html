<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>10-sinf Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .question {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .question h3 {
      margin-bottom: 10px;
    }
    .question label {
      display: block;
      margin: 5px 0;
    }
    #submitBtn {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 18px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #result {
      text-align: center;
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>10-sinf Matematika Testi</h1>

  <form id="quizForm">
    <div class="question">
      <h3>1-savol: (x + 5)(x – 5) = ?</h3>
      <label><input type="radio" name="q1" value="a"> x² – 25</label>
      <label><input type="radio" name="q1" value="b"> x² + 25</label>
      <label><input type="radio" name="q1" value="c"> x² – 10x</label>
    </div>

    <div class="question">
      <h3>2-savol: √900 = ?</h3>
      <label><input type="radio" name="q2" value="a"> 30</label>
      <label><input type="radio" name="q2" value="b"> 25</label>
      <label><input type="radio" name="q2" value="c"> 35</label>
    </div>

    <div class="question">
      <h3>3-savol: 3x – 7 = 11 tenglamada x = ?</h3>
      <label><input type="radio" name="q3" value="a"> 6</label>
      <label><input type="radio" name="q3" value="b"> 5</label>
      <label><input type="radio" name="q3" value="c"> 7</label>
    </div>

    <div class="question">
      <h3>4-savol: (a – b)² formulasi?</h3>
      <label><input type="radio" name="q4" value="a"> a² – 2ab + b²</label>
      <label><input type="radio" name="q4" value="b"> a² + 2ab + b²</label>
      <label><input type="radio" name="q4" value="c"> a² + b²</label>
    </div>

    <div class="question">
      <h3>5-savol: 2/5 + 3/10 = ?</h3>
      <label><input type="radio" name="q5" value="a"> 7/10</label>
      <label><input type="radio" name="q5" value="b"> 1/2</label>
      <label><input type="radio" name="q5" value="c"> 3/5</label>
    </div>

    <div class="question">
      <h3>6-savol: 20² – 15² = ?</h3>
      <label><input type="radio" name="q6" value="a"> 175</label>
      <label><input type="radio" name="q6" value="b"> 175</label>
      <label><input type="radio" name="q6" value="c"> 175</label>
    </div>

    <div class="question">
      <h3>7-savol: 100 ÷ (5 × 2) = ?</h3>
      <label><input type="radio" name="q7" value="a"> 10</label>
      <label><input type="radio" name="q7" value="b"> 20</label>
      <label><input type="radio" name="q7" value="c"> 5</label>
    </div>

    <div class="question">
      <h3>8-savol: (x + 2)(x + 3) = ?</h3>
      <label><input type="radio" name="q8" value="a"> x² + 5x + 6</label>
      <label><input type="radio" name="q8" value="b"> x² + 6x + 5</label>
      <label><input type="radio" name="q8" value="c"> x² + 2x + 3</label>
    </div>

    <div class="question">
      <h3>9-savol: 225 ÷ 15 = ?</h3>
      <label><input type="radio" name="q9" value="a"> 15</label>
      <label><input type="radio" name="q9" value="b"> 20</label>
      <label><input type="radio" name="q9" value="c"> 25</label>
    </div>

    <div class="question">
      <h3>10-savol: (3/4) × (8/9) = ?</h3>
      <label><input type="radio" name="q10" value="a"> 2/3</label>
      <label><input type="radio" name="q10" value="b"> 3/8</label>
      <label><input type="radio" name="q10" value="c"> 1/2</label>
    </div>

    <button type="button" id="submitBtn">Natijani ko‘rish</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById("submitBtn").onclick = function() {
      let score = 0;

      if(document.querySelector('input[name="q1"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q2"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q3"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q4"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q5"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q6"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q7"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q8"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q9"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q10"]:checked')?.value === "a") score++;

      document.getElementById("result").innerText = 
        "Sizning natijangiz: " + score + " / 10";
    }
  </script>
</body>
</html>
