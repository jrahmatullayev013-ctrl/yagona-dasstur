<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Mock Test — Yagona Dastur</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <ul>
      <li><a href="index.html">🏠 Bosh sahifa</a></li>
      <li><a href="mocktest.html">📘 Mock Test</a></li>
      <li><a href="olimpiada.html">🏆 Online Olimpiada</a></li>
      <li><a href="register.html">📝 Ro‘yxatdan o‘tish</a></li>
    </ul>
  </nav>

  <!-- Hero banner kichikroq -->
  <section class="hero small-hero">
    <div class="overlay">
      <h1>📘 Mock Test</h1>
      <p>Sinfni tanlang va testni boshlang</p>
    </div>
  </section>

  <!-- Sinf tanlash -->
  <div class="login-box">
    <h2>Sinfni tanlang</h2>
    <select id="gradeSelect">
      <option value="">-- Sinfni tanlang --</option>
      <option value="5">5-sinf</option>
      <option value="6">6-sinf</option>
      <option value="7">7-sinf</option>
      <option value="8">8-sinf</option>
      <option value="9">9-sinf</option>
      <option value="10">10-sinf</option>
      <option value="11">11-sinf</option>
    </select>
    <br><br>
    <button onclick="startTest()">Boshlash</button>
  </div>

  <script>
    function startTest() {
      const grade = document.getElementById("gradeSelect").value;
      if (grade === "") {
        alert("Iltimos, sinfni tanlang!");
      } else {
        alert(grade + "-sinf uchun test boshlanadi!");
        // Keyinchalik: window.location.href = "test" + grade + ".html";
      }
    }
  </script>
</body>
</html>
