<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>6-sinf Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .question {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .question h3 {
      margin-bottom: 10px;
    }
    .question label {
      display: block;
      margin: 5px 0;
    }
    #submitBtn {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 18px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #result {
      text-align: center;
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>6-sinf Matematika Testi</h1>

  <form id="quizForm">
    <div class="question">
      <h3>1-savol: 15 × 7 = ?</h3>
      <label><input type="radio" name="q1" value="a"> 105</label>
      <label><input type="radio" name="q1" value="b"> 95</label>
      <label><input type="radio" name="q1" value="c"> 115</label>
    </div>

    <div class="question">
      <h3>2-savol: 9² = ?</h3>
      <label><input type="radio" name="q2" value="a"> 81</label>
      <label><input type="radio" name="q2" value="b"> 72</label>
      <label><input type="radio" name="q2" value="c"> 99</label>
    </div>

    <div class="question">
      <h3>3-savol: Kasrni soddalashtiring: 20/25</h3>
      <label><input type="radio" name="q3" value="a"> 4/5</label>
      <label><input type="radio" name="q3" value="b"> 5/6</label>
      <label><input type="radio" name="q3" value="c"> 3/4</label>
    </div>

    <div class="question">
      <h3>4-savol: √144 = ?</h3>
      <label><input type="radio" name="q4" value="a"> 10</label>
      <label><input type="radio" name="q4" value="b"> 12</label>
      <label><input type="radio" name="q4" value="c"> 14</label>
    </div>

    <div class="question">
      <h3>5-savol: 5! (5 faktorial) qiymati?</h3>
      <label><input type="radio" name="q5" value="a"> 120</label>
      <label><input type="radio" name="q5" value="b"> 60</label>
      <label><input type="radio" name="q5" value="c"> 24</label>
    </div>

    <div class="question">
      <h3>6-savol: 2x + 5 = 11 tenglamada x = ?</h3>
      <label><input type="radio" name="q6" value="a"> 3</label>
      <label><input type="radio" name="q6" value="b"> 6</label>
      <label><input type="radio" name="q6" value="c"> 2</label>
    </div>

    <div class="question">
      <h3>7-savol: 100 ÷ 4 = ?</h3>
      <label><input type="radio" name="q7" value="a"> 20</label>
      <label><input type="radio" name="q7" value="b"> 25</label>
      <label><input type="radio" name="q7" value="c"> 30</label>
    </div>

    <div class="question">
      <h3>8-savol: 3/5 + 2/5 = ?</h3>
      <label><input type="radio" name="q8" value="a"> 1</label>
      <label><input type="radio" name="q8" value="b"> 5/5</label>
      <label><input type="radio" name="q8" value="c"> 6/5</label>
    </div>

    <div class="question">
      <h3>9-savol: 7 × (3 + 2) = ?</h3>
      <label><input type="radio" name="q9" value="a"> 35</label>
      <label><input type="radio" name="q9" value="b"> 21</label>
      <label><input type="radio" name="q9" value="c"> 40</label>
    </div>

    <div class="question">
      <h3>10-savol: 1/2 × 1/4 = ?</h3>
      <label><input type="radio" name="q10" value="a"> 1/8</label>
      <label><input type="radio" name="q10" value="b"> 1/6</label>
      <label><input type="radio" name="q10" value="c"> 1/4</label>
    </div>

    <button type="button" id="submitBtn">Natijani ko‘rish</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById("submitBtn").onclick = function() {
      let score = 0;

      if(document.querySelector('input[name="q1"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q2"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q3"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q4"]:checked')?.value === "b") score++;
      if(document.querySelector('input[name="q5"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q6"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q7"]:checked')?.value === "b") score++;
      if(document.querySelector('input[name="q8"]:checked')?.value === "c") score++;
      if(document.querySelector('input[name="q9"]:checked')?.value === "a") score++;
      if(document.querySelector('input[name="q10"]:checked')?.value === "a") score++;

      document.getElementById("result").innerText = 
        "Sizning natijangiz: " + score + " / 10";
    }
  </script>
</body>
</html>
