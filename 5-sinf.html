<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>5-sinf Testlari</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      background-size: cover;
      background-attachment: fixed;
    }
    h1 { text-align: center; }
    .savol { margin: 20px 0; }
    button { margin: 5px; padding: 8px 15px; }
    #natija { font-weight: bold; margin-top: 30px; text-align: center; }
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Menyuga qaytish tugmasi chap tepa burchakda -->
  <button class="back-btn" onclick="window.location.href='index.html'">← Menyuga qaytish</button>

  <h1>5-sinf Testlari</h1>

  <div id="savollar">
    <div class="savol">
      <p>1-savol: O'zbekiston poytaxti qaysi?</p>
      <button onclick="javob(this,'A')">A) Toshkent</button>
      <button onclick="javob(this,'A')">B) Samarqand</button>
      <button onclick="javob(this,'A')">C) Buxoro</button>
      <button onclick="javob(this,'A')">D) Xiva</button>
    </div>

    <div class="savol">
      <p>2-savol: 5 × 6 = ?</p>
      <button onclick="javob(this,'B')">A) 25</button>
      <button onclick="javob(this,'B')">B) 30</button>
      <button onclick="javob(this,'B')">C) 35</button>
      <button onclick="javob(this,'B')">D) 40</button>
    </div>

    <div class="savol">
      <p>3-savol: “Alpomish” dostoni qaysi turga kiradi?</p>
      <button onclick="javob(this,'C')">A) She’r</button>
      <button onclick="javob(this,'C')">B) Roman</button>
      <button onclick="javob(this,'C')">C) Epos</button>
      <button onclick="javob(this,'C')">D) Hikoya</button>
    </div>

    <div class="savol">
      <p>4-savol: 12 ÷ 3 = ?</p>
      <button onclick="javob(this,'B')">A) 3</button>
      <button onclick="javob(this,'B')">B) 4</button>
      <button onclick="javob(this,'B')">C) 6</button>
      <button onclick="javob(this,'B')">D) 12</button>
    </div>

    <div class="savol">
      <p>5-savol: O'zbekistonning eng katta viloyati qaysi?</p>
      <button onclick="javob(this,'A')">A) Qashqadaryo</button>
      <button onclick="javob(this,'A')">B) Farg‘ona</button>
      <button onclick="javob(this,'A')">C) Andijon</button>
      <button onclick="javob(this,'A')">D) Namangan</button>
    </div>

    <!-- Shu tarzda 15 ta savol qo‘shib chiqiladi -->
    <!-- Sen darslikdan savollarni o‘zing tanlab qo‘yasan -->
  </div>

  <div id="natija"></div>

  <script>
    let ball = 0;
    let javoblar = 0;
    const jamiSavollar = document.querySelectorAll('.savol').length;

    function javob(btn, togri) {
      const parent = btn.parentElement;
      // Agar savolga allaqachon javob berilgan bo‘lsa, boshqa variantni bosish taqiqlanadi
      if (Array.from(parent.querySelectorAll("button")).some(b => b.disabled)) {
        return;
      }

      javoblar++;
      if (btn.innerText.startsWith(togri)) {
        ball++;
      }
      // Variantlarni bloklash
      Array.from(parent.querySelectorAll("button")).forEach(b => b.disabled = true);

      // Oxirida natija chiqarish
      if (javoblar === jamiSavollar) {
        document.getElementById('natija').innerText =
          "Test tugadi! To‘g‘ri javoblar: " + ball + " / " + jamiSavollar;
      }
    }
  </script>
</body>
</html>
