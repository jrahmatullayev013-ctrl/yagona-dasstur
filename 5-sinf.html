<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>5-sinf Matematika Testlari</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
    }
    h1 { text-align: center; }
    .savol { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background: #fff; }
    .savol p { font-weight: bold; }
    button { margin: 5px; padding: 8px 15px; }
    #natija { font-weight: bold; margin-top: 30px; text-align: center; }
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Menyuga qaytish tugmasi -->
  <button class="back-btn" onclick="window.location.href='index.html'">← Menyuga qaytish</button>

  <h1>5-sinf Matematika Testlari</h1>

  <div id="savollar">
    <!-- Misol savol -->
    <div class="savol">
      <p>1-savol: Radiusi 8 sm bo‘lgan yarim doira va chorak doiradan tuzilgan shaklning perimetri topilsin.</p>
      <!-- Agar rasm kerak bo‘lsa <img src="rasm.png"> qo‘yish mumkin -->
      <button onclick="javob(this,'B')">A) P = 16 + 8 sm</button>
      <button onclick="javob(this,'B')">B) P = 24 + 8π sm</button>
      <button onclick="javob(this,'B')">C) P = 8 + 16π sm</button>
      <button onclick="javob(this,'B')">D) P = 16 + 12π sm</button>
    </div>

    <!-- Shu tarzda 15 ta savol qo‘shib chiqiladi -->
  </div>

  <div id="natija"></div>

  <script>
    let ball = 0;
    let javoblar = 0;
    const jamiSavollar = document.querySelectorAll('.savol').length;

    function javob(btn, togri) {
      const parent = btn.parentElement;
      // Agar savolga allaqachon javob berilgan bo‘lsa, boshqa variantni bosish taqiqlanadi
      if (Array.from(parent.querySelectorAll("button")).some(b => b.disabled)) {
        return;
      }

      javoblar++;
      if (btn.innerText.trim().startsWith(togri)) {
        ball++;
      }
      // Variantlarni bloklash
      Array.from(parent.querySelectorAll("button")).forEach(b => b.disabled = true);

      // Oxirida natija chiqarish
      if (javoblar === jamiSavollar) {
        document.getElementById('natija').innerText =
          "Test tugadi! To‘g‘ri javoblar: " + ball + " / " + jamiSavollar;
      }
    }
  </script>
</body>
</html>
